# render.yaml — Infrastructure as Code pour Render
# Doc : https://render.com/docs/blueprint-spec

services:
  - type: web
    name: budgetflow
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120 --access-logfile -"
    healthCheckPath: /api/accounts/health/

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

      - key: DEBUG
        value: "False"

      # Généré automatiquement par Render (50+ chars, unique par déploiement)
      - key: SECRET_KEY
        generateValue: true

      # Accepte *.onrender.com — à mettre à jour si domaine personnalisé
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      # Base de données — injectée depuis le service PostgreSQL ci-dessous
      - key: DATABASE_URL
        fromDatabase:
          name: budgetflow-db
          property: connectionString

      # CORS : même domaine (Django sert React) → pas critique, mais on autorise le domaine Render
      - key: CORS_ALLOWED_ORIGINS
        value: "https://budgetflow.onrender.com"

      # URL du frontend utilisée dans les liens email
      - key: FRONTEND_URL
        value: "https://budgetflow.onrender.com"

      # ── À renseigner manuellement dans le dashboard Render ──────────────────
      # Clé Anthropic pour l'assistant IA
      - key: ANTHROPIC_API_KEY
        sync: false

      # Email SMTP (Gmail App Password)
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: budgetflow-db
    databaseName: budgetflow
    user: budgetflow
    plan: free
