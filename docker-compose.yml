version: "3.9"

# ── Volumes persistants ───────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_files:
  media_files:

# ── Réseau interne ────────────────────────────────────────────────────────────
networks:
  budgetflow:
    driver: bridge

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: budgetflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-budgetflow}
      POSTGRES_USER: ${DB_USER:-budgetflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budgetflow_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - budgetflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-budgetflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: budgetflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - budgetflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (stockage objet S3-compatible) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: budgetflow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    networks:
      - budgetflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Mailpit (serveur SMTP de développement) ─────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: budgetflow_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web
    networks:
      - budgetflow

  # ── Backend Django ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: budgetflow_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - budgetflow
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      target: development
    container_name: budgetflow_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - budgetflow
    command: celery -A config worker --loglevel=info --concurrency=4 -Q default,emails,notifications
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      target: development
    container_name: budgetflow_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - budgetflow
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Flower (monitoring Celery) ───────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      target: development
    container_name: budgetflow_flower
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - budgetflow
    command: celery -A config flower --port=5555

  # ── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: budgetflow_frontend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3000:3000"
    networks:
      - budgetflow
    environment:
      VITE_API_URL: http://localhost:8000

  # ── Nginx (reverse proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: budgetflow_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - budgetflow

  # ── pgAdmin (administration PostgreSQL) ─────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: budgetflow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - budgetflow
