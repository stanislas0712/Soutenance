[flake8]
max-line-length = 100
extend-ignore =
    E203,   # whitespace before ':'
    W503,   # line break before binary operator
    E501,   # line too long (géré par black)
exclude =
    .git,
    __pycache__,
    migrations,
    venv,
    .venv,
    staticfiles,
per-file-ignores =
    __init__.py:F401
    */settings/*.py:F405,F403
